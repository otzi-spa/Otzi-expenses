services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: waexp-web
    env_file:
      - ../env/.env.dev
    environment:
      DJANGO_ENV: dev
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      AZURE_CONNECTION_STRING: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFeqCnf2s3E6YkYkV4fA8l8f6gA2vBfV0m6mJmF3x9m9g==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    networks:
      - default
      - dq-proxy
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: waexp-postgres
    environment:
      POSTGRES_DB: waexp
      POSTGRES_USER: waexp
      POSTGRES_PASSWORD: waexp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waexp -d waexp"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: waexp-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data

volumes:
  pg_data:
  azurite_data:


networks:
  dq-proxy:
    external: true