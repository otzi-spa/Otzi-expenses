version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: waexp-postgres
    environment:
      POSTGRES_DB: waexp
      POSTGRES_USER: waexp
      POSTGRES_PASSWORD: waexp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waexp -d waexp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: waexp-redis
    ports:
      - "6379:6379"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: waexp-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000" # Blob
      - "10001:10001" # Queue
      - "10002:10002" # Table
    volumes:
      - azurite_data:/data

volumes:
  pg_data:
  azurite_data: