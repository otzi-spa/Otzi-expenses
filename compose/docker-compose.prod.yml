services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: waexp-web
    env_file:
      - ../env/.env.prod
    environment:
      DJANGO_ENV: prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: gunicorn waexp.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 120
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - default
      - dq-proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: waexp-worker
    env_file:
      - ../env/.env.prod
    environment:
      DJANGO_ENV: prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      RUN_MIGRATIONS: 0
      COLLECTSTATIC: 0
    command: celery -A waexp worker --loglevel=info
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: waexp-postgres
    env_file:
      - ../env/.env.prod
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: waexp-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  redis_data:

networks:
  dq-proxy:
    external: true
