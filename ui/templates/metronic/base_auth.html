{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block page_title %}Ingresar{% endblock %}</title>

  <!-- Metronic core CSS -->
  <link rel="stylesheet" href="{% static 'theme/metronic/assets/plugins/global/plugins.bundle.css' %}">
  <link rel="stylesheet" href="{% static 'theme/metronic/assets/css/style.bundle.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --otzi-font-family: "Barlow", "Segoe UI", "Helvetica Neue", sans-serif;
    }

    body, .app-root, .card, .btn, .form-control, .form-select {
      font-family: var(--otzi-font-family) !important;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--otzi-font-family) !important;
      letter-spacing: 0.1px;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body id="kt_body" class="app-blank bgi-size-cover bgi-attachment-fixed">
  {# Copia aquí el “wrapper” de login de Metronic y deja un bloque para el form #}

  <div class="d-flex flex-column flex-root" id="kt_app_root">
    <div class="d-flex flex-column flex-lg-row flex-column-fluid">
      <!-- Columna/imagen lateral si tu variante la trae -->
      <div class="d-flex flex-center w-lg-50 p-10 order-2 order-lg-1">
        <div class="w-xxl-500px p-10">
          {% block auth_content %}{% endblock %}
        </div>
      </div>
      <!-- Columna branding/imagen -->
      <div class="d-flex w-lg-50 bgi-size-cover bgi-position-center order-1 order-lg-2"
           style="background-image: url({% static 'theme/metronic/assets/media/auth/loginImage.jpg' %})"></div>
    </div>
  </div>

  <!-- Metronic core JS -->
  <script src="{% static 'theme/metronic/assets/plugins/global/plugins.bundle.js' %}"></script>
  <script src="{% static 'theme/metronic/assets/js/scripts.bundle.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
